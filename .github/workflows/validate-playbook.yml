name: Validate Playbook

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate playbook
        run: bash scripts/validate_playbook.sh
